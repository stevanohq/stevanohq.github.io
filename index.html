<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>STEVANO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      background: radial-gradient(circle at 30% 10%, #0a0e12, #020405);
      font-family: 'Inter', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eef2f5;
      padding: 20px;
    }
    .card {
      max-width: 600px;
      width: 100%;
      background: rgba(10, 14, 18, 0.7);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(184, 199, 217, 0.25);
      border-radius: 3rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 40px 70px rgba(0,0,0,0.7), inset 0 1px 2px rgba(255,255,255,0.05);
      text-align: center;
    }
    .line {
      width: 120px;
      height: 2px;
      margin: 0 auto 2rem;
      background: linear-gradient(90deg, transparent, #c8d8e8, #b8c7d9, #c8d8e8, transparent);
      box-shadow: 0 0 10px rgba(184,199,217,0.5);
    }
    h1 {
      font-size: 3.5rem;
      font-weight: 500;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #f0f6ff, #b8c7d9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .tag {
      font-size: 0.75rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #9aaebf;
      margin-bottom: 2rem;
    }
    .msg {
      font-size: 0.95rem;
      color: #c8d8e8;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .foot {
      font-size: 0.65rem;
      color: #6a7a8a;
      letter-spacing: 4px;
      text-transform: uppercase;
      border-top: 1px solid rgba(184,199,217,0.2);
      padding-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="line"></div>
    <h1>STEVANO</h1>
    <div class="tag">PLATINUM · NEXUS</div>
    <div class="msg">Private headquarters<br>Authorized access only</div>
    <div class="foot">stevano.github.io</div>
  </div>
</body>
</html>
