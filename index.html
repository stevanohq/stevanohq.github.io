<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>STEVANO · PLATINUM</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      background: radial-gradient(circle at 30% 10%, #0a0e12, #020405);
      font-family: 'Inter', 'Segoe UI', 'Courier New', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eef2f5;
      padding: 1.5rem;
    }

    .hq-card {
      max-width: 660px;
      width: 100%;
      background: rgba(10, 14, 18, 0.65);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(184, 199, 217, 0.2);
      border-radius: 3rem;
      padding: 2.8rem 2rem;
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.7), inset 0 1px 2px rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .platinum-line {
      width: 140px;
      height: 2px;
      margin: 0 auto 2.2rem auto;
      background: linear-gradient(90deg, transparent, #d9e2ec, #b8c7d9, #d9e2ec, transparent);
      box-shadow: 0 0 14px rgba(184, 199, 217, 0.5);
    }

    h1 {
      font-size: clamp(2.4rem, 12vw, 4rem);
      font-weight: 500;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #f0f6ff, #b8c7d9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      text-shadow: 0 0 25px rgba(200, 216, 232, 0.15);
    }

    .tagline {
      font-size: 0.75rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #9aaebf;
      margin-bottom: 2.2rem;
      font-weight: 400;
      word-spacing: 8px;
    }

    .message {
      font-size: 0.95rem;
      color: #c8d8e8;
      margin-bottom: 2.2rem;
      line-height: 1.6;
      font-weight: 300;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: rgba(184, 199, 217, 0.25);
      margin: 2rem auto 1.8rem;
    }

    .footer-note {
      font-size: 0.65rem;
      color: #6a7a8a;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .glow {
      position: relative;
    }
    .glow::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 3rem;
      pointer-events: none;
      box-shadow: 0 0 60px rgba(184, 199, 217, 0.06);
    }
  </style>
</head>
<body>
  <div class="hq-card glow">
    <div class="platinum-line"></div>
    <h1>STEVANO</h1>
    <div class="tagline">Platinum · Nexus · Secure</div>
    <div class="message">
      Private headquarters.<br>
      Authorized access only.
    </div>
    <div class="divider"></div>
    <div class="footer-note">stevano.github.io</div>
  </div>
</body>
</html>
