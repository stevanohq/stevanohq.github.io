<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEXUS BURN · SERVERLESS</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f1215">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <style>
    :root {
      --bg: #0f1215;
      --card: rgba(10,12,14,0.85);
      --platinum: #b8c7d9;
      --platinum-glow: rgba(184,199,217,0.4);
      --ice: #c8d8e8;
      --silver: #9aaebf;
      --alert: #ff6b6b;
      --ok: #6bcf9f;
      --border: #1e2428;
    }
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(circle at 30% 10%, #0a0c0e, #030405);
      font-family: 'Inter', 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eef2f5;
      padding: 15px;
      overflow: auto;
    }
    .vault {
      width: 100%;
      max-width: 550px;
      background: var(--card);
      backdrop-filter: blur(14px);
      padding: 1.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(184,199,217,0.25);
      box-shadow: 0 30px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .header-ambient {
      width: 100%;
      height: 2px;
      margin-bottom: 1.2rem;
      background: linear-gradient(90deg, transparent, var(--platinum), var(--ice), var(--platinum), transparent);
      box-shadow: 0 0 10px var(--platinum-glow);
    }
    h1 {
      margin: 0;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--ice), var(--platinum));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(200,216,232,0.3);
    }
    #nexusClock {
      text-align: center;
      font-size: 0.65rem;
      color: #8a9aa8;
      letter-spacing: 2px;
      margin-top: 8px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .main-area {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    textarea, input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--border);
      color: var(--ice);
      padding: 0.9rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.5;
      outline: none;
      transition: 0.2s;
      font-family: 'Inter', monospace;
    }
    textarea {
      height: 110px;
      resize: vertical;
    }
    textarea:focus, input:focus {
      border-color: var(--platinum);
      box-shadow: 0 0 12px var(--platinum-glow);
    }
    .pass-wrapper {
      position: relative;
      width: 100%;
    }
    input.pass-input {
      text-align: center;
      letter-spacing: 4px;
    }
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--silver);
      cursor: pointer;
      font-size: 1rem;
      opacity: 0.7;
      outline: none;
    }
    .eye-btn:hover {
      color: var(--platinum);
    }
    button.btn-exec {
      width: 100%;
      padding: 0.9rem;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--platinum);
      color: var(--platinum);
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 3px;
      transition: 0.2s ease;
      font-size: 0.75rem;
      outline: none;
      border-radius: 2rem;
      backdrop-filter: blur(4px);
    }
    button.btn-exec:hover {
      background: var(--platinum);
      color: #0a0c0e;
      box-shadow: 0 6px 14px var(--platinum-glow);
      transform: translateY(-2px);
    }
    .btn-red {
      border-color: var(--alert) !important;
      color: var(--alert) !important;
    }
    .btn-red:hover {
      background: var(--alert) !important;
      color: #fff !important;
      box-shadow: 0 0 20px rgba(255,107,107,0.3) !important;
    }
    #resultArea {
      margin-top: 1.2rem;
      display: none;
      text-align: center;
      border-top: 1px solid rgba(184,199,217,0.2);
      padding-top: 1.2rem;
    }
    .link-box {
      background: rgba(0,0,0,0.5);
      border: 1px dashed var(--ice);
      padding: 0.8rem;
      font-size: 0.7rem;
      word-break: break-all;
      margin-bottom: 0.8rem;
      color: var(--ice);
      border-radius: 1rem;
      font-family: monospace;
    }
    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 0.8rem;
    }
    .btn-util {
      flex: 1;
      padding: 0.6rem;
      background: rgba(0,0,0,0.4);
      color: var(--silver);
      border: 1px solid var(--border);
      font-size: 0.65rem;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2rem;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-util:hover {
      color: #fff;
      border-color: var(--platinum);
      background: rgba(184,199,217,0.1);
    }
    .status-bar {
      font-size: 0.6rem;
      color: #6a7a8a;
      margin-top: 1.5rem;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid rgba(184,199,217,0.2);
      padding-top: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #status {
      font-weight: bold;
      color: var(--alert);
    }
    #contentReveal {
      margin-top: 1.2rem;
      padding: 1rem;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--ice);
      border-radius: 1rem;
      display: none;
      white-space: pre-wrap;
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--ice);
      word-break: break-word;
    }
    @media (max-width: 500px) {
      .vault { padding: 1.2rem; }
      h1 { font-size: 1.6rem; letter-spacing: 5px; }
    }
  </style>
</head>
<body>

<div class="vault">
  <div class="header-ambient"></div>
  <h1>NEXUS BURN</h1>
  <div id="nexusClock">SERVERLESS</div>

  <div class="main-area">
    <div id="createMode">
      <textarea id="msgBody" placeholder="INSERT SECRET TEXT..."></textarea>
      <div class="pass-wrapper" style="margin-top:12px">
        <input type="password" id="msgPass" class="pass-input" placeholder="MASTER PASSKEY">
        <button class="eye-btn" onclick="togglePass('msgPass', 'eye1')" id="eye1">👁️</button>
      </div>
      <button class="btn-exec" style="margin-top:15px" onclick="generateLink()">GENERATE BURN LINK</button>
    </div>

    <div id="readMode" style="display:none;">
      <div class="pass-wrapper">
        <input type="password" id="openPass" class="pass-input" placeholder="DECRYPT KEY">
        <button class="eye-btn" onclick="togglePass('openPass', 'eye2')" id="eye2">👁️</button>
      </div>
      <button class="btn-exec btn-red" style="margin-top:15px" onclick="burnAndShow()">OPEN & OBLITERATE</button>
      <div id="contentReveal"></div>
    </div>

    <div id="resultArea">
      <div class="link-box" id="finalURL"></div>
      <div class="action-row">
        <button class="btn-util" style="border-color:var(--ice); color:var(--ice)" onclick="copyToClipboard()">COPY LINK</button>
        <button class="btn-util" onclick="location.reload()">NEW BURN</button>
      </div>
    </div>
  </div>

  <div class="status-bar">
    <span>SERVERLESS PROTOCOL</span>
    <span id="status">READY</span>
  </div>
</div>

<script>
  function updateClock() {
    const now = new Date();
    const timeStr = now.toLocaleString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('nexusClock').innerText = timeStr.toUpperCase();
  }
  setInterval(updateClock, 1000); updateClock();

  function togglePass(id, eyeId) {
    const p = document.getElementById(id);
    const i = document.getElementById(eyeId);
    p.type = p.type === "password" ? "text" : "password";
    i.innerText = p.type === "password" ? "👁️" : "🔒";
  }

  const hash = window.location.hash.substring(1);
  if (hash) {
    document.getElementById('createMode').style.display = 'none';
    document.getElementById('readMode').style.display = 'block';
    document.querySelector('h1').innerText = "BURN DECRYPTION";
  }

  async function deriveKey(p) {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey("raw", enc.encode(p), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: enc.encode("SERVERLESS_SALT"), iterations: 100000, hash: "SHA-256" },
      km,
      { name: "AES-GCM", length: 256 },
      false,
      ["encrypt", "decrypt"]
    );
  }

  async function process(t, p, mode) {
    const key = await deriveKey(p);
    if (mode === 'enc') {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const buf = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(t));
      const combined = new Uint8Array(12 + buf.byteLength);
      combined.set(iv);
      combined.set(new Uint8Array(buf), 12);
      return btoa(String.fromCharCode(...combined))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    } else {
      try {
        let base64 = t.replace(/-/g, '+').replace(/_/g, '/');
        while (base64.length % 4) base64 += '=';
        const combined = new Uint8Array(atob(base64).split('').map(c => c.charCodeAt(0)));
        const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: combined.slice(0, 12) }, key, combined.slice(12));
        return new TextDecoder().decode(dec);
      } catch (e) {
        return null;
      }
    }
  }

  async function generateLink() {
    const txt = document.getElementById('msgBody').value.trim();
    const pass = document.getElementById('msgPass').value.trim();
    if (!txt || !pass) return alert("MESSAGE & KEY REQUIRED.");
    const cipher = await process(txt, pass, 'enc');
    const url = window.location.origin + window.location.pathname + '#' + cipher;
    document.getElementById('createMode').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('finalURL').innerText = url;
    document.querySelector('h1').innerText = "BURN LINK READY";
  }

  async function burnAndShow() {
    const pass = document.getElementById('openPass').value.trim();
    if (!pass) return alert("KEY REQUIRED.");
    const cipher = window.location.hash.substring(1);
    if (!cipher) {
      alert("NO DATA FOUND.");
      return;
    }
    const res = await process(cipher, pass, 'dec');
    if (!res) {
      alert("INVALID KEY OR CORRUPTED DATA.");
      return;
    }
    const reveal = document.getElementById('contentReveal');
    reveal.innerText = res;
    reveal.style.display = 'block';
    // Hapus hash dari URL (burn)
    history.replaceState(null, '', window.location.pathname);
    document.getElementById('status').innerText = "OBLITERATED";
    document.getElementById('readMode').querySelector('.btn-exec').style.display = 'none';
    document.getElementById('openPass').style.display = 'none';
    document.getElementById('eye2').style.display = 'none';
  }

  function copyToClipboard() {
    const txt = document.getElementById('finalURL').innerText;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(txt).then(() => alert("LINK COPIED."));
    } else {
      const textArea = document.createElement("textarea");
      textArea.value = txt;
      document.body.appendChild(textArea);
      textArea.select();
      document.execCommand('copy');
      document.body.removeChild(textArea);
      alert("LINK COPIED (FALLBACK).");
    }
  }
</script>
</body>
</html>
